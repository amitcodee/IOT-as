<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RFID Attendance System</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="login-page">
  <!-- Loading Overlay -->
  <div class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="logo">
      <i class="fas fa-fingerprint"></i>
    </div>
    <h2>Welcome Back</h2>
    <p>Sign in to RFID Attendance Management System</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label-custom">Email Address</label>
        <div class="input-group">
          <span class="input-group-text" style="border-radius: 10px 0 0 10px; background: var(--input-bg); border-color: var(--border-color);">
            <i class="fas fa-envelope" style="color: var(--text-muted);"></i>
          </span>
          <input type="email" id="loginEmail" class="form-control form-control-custom"
                 placeholder="admin@company.com" required
                 style="border-radius: 0 10px 10px 0;">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label-custom">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="border-radius: 10px 0 0 10px; background: var(--input-bg); border-color: var(--border-color);">
            <i class="fas fa-lock" style="color: var(--text-muted);"></i>
          </span>
          <input type="password" id="loginPassword" class="form-control form-control-custom"
                 placeholder="Enter your password" required
                 style="border-radius: 0 10px 10px 0;">
        </div>
      </div>

      <div class="form-group d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe">
          <label class="form-check-label" for="rememberMe" style="font-size: 0.85rem; color: var(--text-muted);">
            Remember me
          </label>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="loginBtnText">Sign In</span>
        <span id="loginSpinner" class="d-none">
          <i class="fas fa-spinner fa-spin"></i> Signing in...
        </span>
      </button>
    </form>

    <div class="mt-4 text-center">
      <small style="color: var(--text-muted);">
        Default: admin@company.com / admin123
      </small>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container"></div>

  <!-- Scripts -->
  <script src="assets/js/app.js"></script>
  <script>
    // Check if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = "dashboard.html";
    }

    // Handle login form submission
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        Toast.warning("Please fill in all fields");
        return;
      }

      // Show loading state
      document.getElementById("loginBtnText").classList.add("d-none");
      document.getElementById("loginSpinner").classList.remove("d-none");

      try {
        const result = await API.login(email, password);

        if (result.status === "success") {
          Auth.login(result.user);
          Toast.success("Login successful! Redirecting...");
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);
        } else {
          Toast.error(result.message || "Invalid credentials");
        }
      } catch (error) {
        Toast.error("Connection failed. Please check your internet connection.");
      } finally {
        document.getElementById("loginBtnText").classList.remove("d-none");
        document.getElementById("loginSpinner").classList.add("d-none");
      }
    });
  </script>
</body>
</html>
